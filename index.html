<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoffeeRoasters</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/styles.css">
  <!-- Favicon -->
  <link rel="icon" href="images/favicon.png">

</head>

<body>
  <div class="site-header-hero-wrapper">
    <!-- SITE HEADER -->
    <div class="site-header">
      <div class="container site-header-container">
        <!-- LOGO -->
        <a href="index.html" class="site-header-logo-link">
          <img class="site-header-logo-img" src="images/logo.png" alt="CoffeeRoasters logo" width="235" height="24">
        </a>

        <!-- SITENAV -->
        <nav class="sitenav">
          <ul class="sitenav__list">
            <li class="sitenav__item"><a class="sitenav__link" href="#">Home</a></li>
            <li class="sitenav__item"><a class="sitenav__link" href="#">About</a></li>
            <li class="sitenav__item"><a class="sitenav__link" href="#">Create your plan</a></li>
          </ul>
        </nav>
      </div>
    </div>

    <!-- HERO -->

    <div class="hero">
      <div class="container hero-container">
        <!-- Hero info -->
        <div class="hero-info-wrapper">
          <h1 class="hero-title">
            Good coffee <br>
            is made simply.
          </h1>
          <p class="hero-text">
            Start your mornings with the world’s best coffees. Try our expertly curated artisan coffees from our best
            roasters delivered directly to your door, at your schedule.
          </p>
          <a class="button button-green" href="#">Create your plan</a>
        </div>

        <!-- Hero image -->
        <div class="hero-image">
          <img class="hero-img hero-image-index" src="images/hero-img.jpg" alt="Coffee and cake being served"
            width="710" height="696" srcset="images/hero-img.jpg 1x, images/hero-img@2x.jpg 2x">
          <img class="hero-badge" src="images/hero-badge.svg" alt="Hero badge" width="160" height="160">
        </div>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>

</html>
